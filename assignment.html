<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Responsive Navbar</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background: #f4f4f4; }

        .navbar {
            background: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            position: relative;
        }

        /* Hide the actual checkbox */
        #menu-toggle { display: none; }

        /* Hamburger Icon Styling */
        .hamburger {
            display: none; /* Hidden on desktop */
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }
        .hamburger span {
            width: 25px; height: 3px;
            background: white; border-radius: 2px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
        }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; }

        /* Responsive Settings */
        @media (max-width: 768px) {
            .hamburger { display: flex; } /* Show hamburger on mobile */

            .nav-links {
                display: none; /* Hide menu by default on mobile */
                flex-direction: column;
                position: absolute;
                top: 100%; /* Sits right under the navbar */
                left: 0;
                background: #34495e;
                width: 100%;
                text-align: center;
                padding: 20px 0;
                z-index: 100;
            }

            /* The "Magic" part: When checkbox is checked, show the menu */
            #menu-toggle:checked ~ .nav-links {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><h3>MyBrand</h3></div>

        <input type="checkbox" id="menu-toggle">

        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Portfolio</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div style="padding: 40px; text-align: center;">
        <p>Yo chai simple lab report ho jun ma hamile responsive navbar design gareko xau.</p>
    </div>

</body>
</html>
