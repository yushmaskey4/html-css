<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 100%;
            height: 90vh;
            background-color: rgba(255, 0, 0, 0.486);
            position: relative;
            /* top: 100px; */
        }
        p{
            text-align: justify;
        }
        .container img{
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
        .container h2{
            position: absolute;
            left: 20%;
            top: 43%;
            transform: translate(-50%,-50%);
            color: white;
        }
        .container p{
            position: absolute;
            left: 29%;
            top: 50%;
            transform: translate(-50%,-50%);
            color: white;
        }
        .container button{
            position: absolute;
            left: 17%;
            top: 60%;
            transform: translate(-50%,-50%);
            color: white;
            padding: 10px 10px;
            border-radius: 10px;
            background-color: rgb(189, 2, 189);
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://t3.ftcdn.net/jpg/07/53/95/70/360_F_753957094_P7auPgXTtoyXqhFNWOIMUyl6dgm8sCUe.jpg" alt="hero">
        <h2>Travel without limits</h2>
        <P>Create lifetime memories in unforgettable locations around the world</P>
        <button>Choose your tour</button>
    </div>
</body>
</html>
