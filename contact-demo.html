<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: linear-gradient(to right, rgb(249, 133, 249), rgb(137, 16, 218));
        }
        .container{
            display: flex;
            /* justify-content: space-between; */
            /* padding: 20px; */
            align-items: center;
            min-height: 70vh;
            background: rgb(51, 180, 227);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            border-radius: 5px;
        }
        .container .left{
            width: 50%;
            /* height: 70vh; */
            /* background-color: rgb(2, 183, 255); */
            color: white;
            padding: 10px;
            text-align: center;
        }
        .container .left .pp{
            /* line-height: 1.6; */
            font-size: 16px;
            text-align: center;
            color: whitesmoke;
        }
        .container .left h1{
            text-align: center;            
        }
        .container .right{
            background-color: white;
            width: 50%;
            min-height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            /* align-items: center; */
            flex-direction: column;

        }
        .form{
            /* gap: 15px; */
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }
        
        
         .form input,.form textarea{
            border: none;
            padding: 8px 12px;
            font-size: 16px;
            background-color: rgba(128, 128, 128, 0.212);
            margin: 0 0 10px 0;
        }
        .form span{
            color: red;
            margin-bottom: 10px;
        }
        .form .send{
            background-color: rgb(51, 180, 227);
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            padding: 10px 40px;
            cursor: pointer;
            margin-left: 50%;
            width: fit-content;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>Let's Chat</h1>
            <p class="pp">Whether you have a question, want to start a project or simply want to connect.</p>
            <p class="pp">Feel free to send me a message in the contact form.</p>
        </div>
        <div class="right">
            <h1>Contact</h1>
            <form action="#" class="form">
                <span>*Required</span>
                
                <input type="text" id="name" name="name" placeholder="Name*">
                
                <input type="email" id="email" name="email" placeholder="Email*">
                <input type="text" id="company" name="company" placeholder="Company*">
                <input type="text" id="phone" name="phone" placeholder="Phone*">
                
                <textarea id="message" name="message" placeholder="Message" rows="6" cols="21"></textarea>
                <input class="send" type="submit" value="Submit">
        </div>
    </div>
</body>
</html>
