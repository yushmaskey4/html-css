<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        header{
            background-color: green;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            height: 50px;
        }
        .logo a{
            color: white;
            text-decoration: none;
        }
        nav a{

        }
        .center{
            text-align: center;
            color: white;
            background-image: url("lndscp.jpeg") ;

            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .c1{
            
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);

        .services-content{
            justify-content: space-between;

        }
        .services-content div{

            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .container1{
            width: 90%;
            margin: auto;
        }

</head>

    <header>
        <div class="logo">
         <a href="#">GPLC</a> 
        </div>
        <nav>
            <a href="#">Home</a>

            <a href="#">Service</a>
            <a href="#">Contact</a>
        </nav>

    </header>
    <section class="center">
        <div class="c1" >
            <h1>Welcome to Our Website</h1>
            <p>Hello, I am learning Web</p>
        </div>  

               
    </section>
    <main class="container1">
        <section class="services">
            <h1 style="text-align: center;">Our Services</h1>
            <div class="services-content">
                <div class="sr1">
                    <img src="web-designing.jpeg" alt="">
                    <h2>Web Designing</h2>
                </div>
                <div class="sr1">Graphic Designing</div>
                <div class="sr1">Digital Marketing</div>
            </div>
        </section>

</html>
