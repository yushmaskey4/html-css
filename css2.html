<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    h1{
        color: green;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bolder;
        font-size: medium;
        text-decoration: line-through;
        text-decoration-color: red ;
        text-decoration-style: dotted;
        text-align: center;
        text-shadow: 15cm;
        text-transform: capitalize;
    }

    .div1, .div2{
        border: 5px solid red;
        border-radius: 10px;
        width: 200px;
        height: 50px;
       /* margin: 10px; */
        margin: 10px 20px 20px 10px;
        padding: 10px ;
        /*border-top: 5px dotted blue;*/
        /* border-style: dotted;
            border-width: 5px;
            border-color: red; */
    }
    .div2{
        background-color: rgba(255, 228, 196, 0.447);
    }
</style>
</head>
<body>
    <h1>This is my heading.</h1>
    <div class="div1">
        This is Div 1
    </div>
    <div class="div2">
        This is DIV 2
    </div>
</body>
</html>
