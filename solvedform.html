<script>
    function validateName() {
        let name = document.getElementById("name").value.trim();
        if (name === "") {
            document.getElementById("name-err").innerText = "Name is required";
            return false;
        } else {
            document.getElementById("name-err").innerText = "";
            return true;
        }
    }

    function validateAge() {
        let age = document.getElementById("age").value.trim();
        if (age === "" || isNaN(age) || age < 0 || age > 120){
            document.getElementById("age-err").innerText = "Please enter a valid age";
            return false;
        } else  {
            document.getElementById("age-err").innerText = "";
            return false;
        }
    }

</script>
