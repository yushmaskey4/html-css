<!DOCTYPE html>
<html>
<head>
  <title>Flexbox Layout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      padding: 20px;
      background-color: #f4f4f4;
    }
    header {
      background-color: #3498db;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .main {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    aside {
      flex: 1;
      background-color: orange;
      padding: 10px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }
    article {
      flex: 3;
      background-color: #ecf0f1;
      padding: 20px;      
    }
    .images {
      display: flex;
      gap: 15px;
      justify-content: space-between;
    }
    .images img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      flex: 1;
      border: 2px solid #555;
    }
    footer {
      background-color: #2ecc71;
      text-align: center;
      padding: 15px;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <header>
    FLEXBOX LAYOUT (Header)
  </header>

  <div class="main">
    <aside>
      Sidebar<br>(Aside)
    </aside>

    <article>
      <h2>Main Content (Article)</h2>
      <div class="images">
        <img src="bmw1.jpg" alt="Image 1">
        <img src="bmw2.jpg" alt="Image 2">
        <img src="bmw3.jpeg" alt="Image 3">
      </div>
    </article>
  </div>

  <footer>
    Footer
  </footer>

</body>
</html>
